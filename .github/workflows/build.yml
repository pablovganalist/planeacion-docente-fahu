name: Generar informes de planeación docente
on:
  push:
    branches: [main]
    paths:
      - "BASE_FAHU.xlsx"
      - "*.R"
      - "*.Rmd"
      - ".github/workflows/build.yml"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
      - name: Cache paquetes R
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ runner.os }}-${{ hashFiles('*.R') }}
          restore-keys: r-pkgs-${{ runner.os }}-
      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2
      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev
      - name: Instalar paquetes R
        run: |
          install.packages(c(
            "rmarkdown", "knitr",
            "tidyverse", "readxl", "janitor",
            "glue", "openxlsx", "writexl"
          ), repos = "https://cloud.r-project.org")
        shell: Rscript {0}
      - name: Generar informes
        run: Rscript run_ci.R
      # Commitea los HTML generados de vuelta al repo en docs/
      # Netlify detecta el cambio y publica automáticamente
      - name: Commit y push de docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "Informes actualizados [skip ci]" || echo "Sin cambios"
          git push
