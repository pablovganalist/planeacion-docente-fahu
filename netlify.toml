[build]
  publish = "docs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Protege cada informe — solo usuarios con el rol correcto
[[redirects]]
  from = "/01_educacion.html"
  to = "/login.html"
  status = 401
  conditions = {Role = ["educacion", "admin"]}
  force = false

