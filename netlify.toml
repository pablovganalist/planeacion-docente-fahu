[build]
  publish = "docs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# ─────────────────────────────────────────────
# DEPARTAMENTO DE EDUCACIÓN
# ─────────────────────────────────────────────
[[redirects]]
  from = "/01_educacion.html"
  to = "/login.html"
  status = 401
  conditions = {Role = ["educacion", "admin"]}
  force = false

[[redirects]]
  from = "/educacion_carr_*.html"
  to = "/login.html"
  status = 401
  conditions = {Role = ["educacion", "admin"]}
  force = false

[[redirects]]
  from = "/comparativos/educacion.html"
  to = "/login.html"
  status = 401
  conditions = {Role = ["educacion", "admin"]}
  force = false

